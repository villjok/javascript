<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простые числа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2E1F14;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            background: #3D2B1F;
            border-radius: 28px;
            padding: 35px;
        }

        h1 {
            color: #E8C49A;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 2px solid #C28A5C;
            width: 60px;
            margin: 0 auto 25px auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #DEB887;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: #2E1F14;
            border: 1px solid #8B691B;
            border-radius: 12px;
            color: #F5E6D3;
            font-size: 1rem;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #DEB887;
        }

        .info {
            color: #B8860B;
            font-size: 12px;
            margin-top: 5px;
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #8B5A2B;
            color: #FFF5E6;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 15px 0 15px 0;
        }

        button:hover {
            background: #A06B3A;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #2E1F14;
            border: 1px solid #8B691B;
            border-radius: 12px;
            color: #F5E6D3;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
            font-family: 'Courier New', monospace;
            min-height: 200px;
        }

        textarea:focus {
            border-color: #DEB887;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Простые числа</h1>
    <hr>
    
    <form id="primeForm">
        <div class="form-group">
            <label>Введите число n (n > 1):</label>
            <input type="number" id="n" step="1" min="2" required>
            <div class="info">Найдёт все простые числа от 2 до n</div>
        </div>

        <button type="button" id="findBtn">Найти</button>
        <textarea id="result" readonly placeholder="Результат появится здесь..."></textarea>
    </form>
</div>

<script>
    'use strict';

    function isPrime(num) {
        if (num <= 1) return false;
        
        const limit = Math.sqrt(num);
        for (let i = 2; i <= limit; i++) {
            if (num % i === 0) {
                return false;
            }
        }
        return true;
    }

    function getPrimesUpTo(n) {
        const primes = [];
        for (let i = 2; i <= n; i++) {
            if (isPrime(i)) {
                primes.push(i);
            }
        }
        return primes;
    }

    document.getElementById('findBtn').addEventListener('click', function() {
        const input = document.getElementById('n');
        const resultArea = document.getElementById('result');
        
        let n = parseInt(input.value, 10);
        
        if (isNaN(n)) {
            resultArea.value = "Ошибка: введите число";
            return;
        }
        
        if (n < 2) {
            resultArea.value = "Ошибка: n должно быть больше 1";
            return;
        }
        
        const primes = getPrimesUpTo(n);
        
        if (primes.length === 0) {
            resultArea.value = "Простых чисел в этом диапазоне нет";
        } else {
            resultArea.value = `Простые числа от 2 до ${n}:\n${primes.join(', ')}`;
        }
    });
</script>
</body>
</html>
