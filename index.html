<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторным работы JS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('Loading_Screen_Bind.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: #F5E6D3;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #3D2B1F;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            box-shadow: 0 0 35px #1A0F0A;
            overflow: hidden;
            padding: 40px 50px;
        }

        h1 {
            color: #E8C49A;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: -0.3px;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 2px solid #C28A5C;
            width: 80px;
            margin: 20px auto 40px auto;
        }

        nav h2 {
            color: #DEB887;
            font-size: 1.6rem;
            font-weight: 700;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #C28A5C;
        }

        nav h2:first-of-type {
            margin-top: 0;
        }

        ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        li {
            display: block;
        }

        a {
            display: block;
            background: #2E1F14;
            color: #F0DCC0;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 1px solid #8B691B;
            font-weight: 500;
        }

        a:hover {
            background: #8B5A2B;
            color: #FFF5E6;
            border-color: #DEB887;
            transform: translateX(5px);
        }

        footer {
            text-align: right;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #C28A5C;
            color: #DEB887;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            nav h2 {
                font-size: 1.3rem;
            }
            ul {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
