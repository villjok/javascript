<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица животных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2E1F14;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #3D2B1F;
            border-radius: 28px;
            padding: 35px;
        }

        h1 {
            color: #E8C49A;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 2px solid #C28A5C;
            width: 60px;
            margin: 0 auto 25px auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #DEB887;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: #2E1F14;
            border: 1px solid #8B691B;
            border-radius: 12px;
            color: #F5E6D3;
            font-size: 1rem;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #DEB887;
        }

        .info {
            color: #B8860B;
            font-size: 12px;
            margin-top: 5px;
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #8B5A2B;
            color: #FFF5E6;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 15px 0 15px 0;
        }

        button:hover {
            background: #A06B3A;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐾 Таблица животных</h1>
    <hr>
    
    <form id="tableForm">
        <div class="form-group">
            <label>Количество строк:</label>
            <input type="number" id="rows" value="5" step="1" min="1" required>
            <div class="info">Результат выводится в консоль (F12)</div>
        </div>

        <button type="submit" id="drawBtn">Рисовать</button>
    </form>
</div>

<script>
    'use strict';

    const SEQUENCE = ['dog', 'dog', 'dog', 'cat', 'cat'];
    const COLS = 6;

    function generateRow(startIndex) {
        const row = [];
        for (let i = 0; i < COLS; i++) {
            const seqIndex = (startIndex + i) % SEQUENCE.length;
            row.push(SEQUENCE[seqIndex]);
        }
        return row.join('\t'); 
    }

    function drawTable(rowsCount) {
        console.clear();
        
        let startIndex = 0;
        for (let rowNum = 0; rowNum < rowsCount; rowNum++) {
            const row = generateRow(startIndex);
            console.log(row);
            startIndex = (startIndex + 1) % SEQUENCE.length;
        }
    }

    document.getElementById('tableForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const input = document.getElementById('rows');
        let rowsCount = parseInt(input.value, 10);
        
        if (isNaN(rowsCount) || rowsCount < 1) {
            alert("Введите корректное количество строк (число >= 1)");
            return;
        }
        
        drawTable(rowsCount);
        alert(`Таблица из ${rowsCount} строк выведена в консоль браузера (F12)`);
    });
</script>
</body>
</html>
